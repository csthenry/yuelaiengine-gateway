# ==============================================================================
# Auth Service 日志配置
# ==============================================================================

level: "info"
format: "json"

enable_caller: true
enable_stacktrace: true
stacktrace_level: "error"

rotation:
  enabled: true
  policy: "size_and_time"
  time_interval: "hour"
  max_size: 100
  max_backups: 7
  max_age: 1
  compress: true

output_paths:
  - "stdout"
  - "./logs/auth-service/app.log"

error_paths:
  - "./logs/auth-service/error.log"
